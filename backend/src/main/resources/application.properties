# Application
spring.application.name=expense-tracker
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/expense_tracker

# JWT
# Override jwt.secret via environment variable JWT_SECRET in production
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-must-be-at-least-32-chars}
jwt.expiration=86400000

# Logging
logging.level.com.expensetracker=DEBUG

# CORS
spring.web.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

