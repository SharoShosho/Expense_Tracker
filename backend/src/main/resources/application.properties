# Application
spring.application.name=expense-tracker
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/expense_tracker

# JWT
# Override jwt.secret via environment variable JWT_SECRET in production
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-must-be-at-least-32-chars}
jwt.expiration=86400000

# Logging
logging.level.com.expensetracker=DEBUG

# CORS
spring.web.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,https://sharoshosho.github.io

# Data Management Configuration
data.management.immediate-retrain-threshold=100
data.management.batch-retrain-threshold=50

nn.model.save-path=/data/models
nn.training.enabled=true
nn.training.schedule-days=7
nn.training.min-samples=30
nn.training.epochs=100
nn.training.batch-size=32
nn.training.learning-rate=0.001
nn.training.validation-split=0.2
nn.training.timeout-minutes=30

# Neural Network Tips Generation
nn.tips.confidence-threshold-low=0.4
nn.tips.confidence-threshold-med=0.6
nn.tips.confidence-threshold-high=0.8

# Tip Ranking
nn.ranking.rule-based-weight=0.4
nn.ranking.nn-weight=0.6
nn.ranking.min-score-filter=50
nn.ranking.max-tips-returned=10

# Personalization
nn.personalization.learning-phase-count=30
nn.personalization.score-increase=0.1
nn.personalization.score-decrease=0.05
nn.personalization.score-min=0.2
nn.personalization.score-max=1.0
nn.personalization.multiplier-min=0.5
nn.personalization.multiplier-max=1.5
nn.personalization.risk-conservative-max=33
nn.personalization.risk-moderate-max=66

